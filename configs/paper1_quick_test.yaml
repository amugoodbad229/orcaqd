# Quick PGA-ME validation on Modal A100-80GB (~$0.50, 2-3 minutes).
# Tests that PG emitter works with real transitions on A100.
# 10 iterations only - just enough to verify convergence and timing.

grid_shape: [25, 25]
min_bd: [-5.0, 0.0]
max_bd: [-1.0, 1.0]

# Small batches for fast iteration
ga_batch_size: 32
pg_batch_size: 32
num_iterations: 10
episode_length: 100
env_batch_size: 32

# Networks
policy_hidden: 64
iso_sigma: 0.005
line_sigma: 0.05

# PG emitter
critic_hidden: 256
critic_lr: 0.0003
actor_lr: 0.0003
pg_steps: 50
critic_steps: 100
pg_buffer_size: 500000
pg_warmup: 1000

# Logging
log_every: 5
save_every: 10
wandb_project: orcaQD
wandb_entity: amugoodbad
wandb_enabled: true
out_dir: /artifacts/runs/quick_test
