# Budget run — finishes within $15 Modal credit on A100-80GB.
# Target: ~1 hour total, ~$2.50 cost.
# Uses PGA-MAP-Elites: GA (Iso+LineDD) + PG (TD3 critic gradient ascent).

grid_shape: [25, 25]
# BD1: wrist yaw [-1.2, 0.7], BD2: mean PIP flexion tanh [-1, 1]
min_bd: [-1.2, -1.0]
max_bd: [0.7, 1.0]

# QD batches — proven on Modal (2.61s/iter)
ga_batch_size: 32
pg_batch_size: 32
num_iterations: 1000
episode_length: 100
env_batch_size: 32

# Networks
policy_hidden: 64
iso_sigma: 0.005
line_sigma: 0.05

# PG emitter
critic_hidden: 256
critic_lr: 0.0003
actor_lr: 0.0003
pg_steps: 50
critic_steps: 100
pg_buffer_size: 500000
pg_warmup: 1000

# Logging
log_every: 50
save_every: 100
wandb_project: orcaQD
wandb_entity: amugoodbad
wandb_enabled: true
out_dir: /artifacts/runs/budget
