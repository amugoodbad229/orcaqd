# Budget run — finishes within $21 Modal credit on A100-80GB.
# Target: ~6-7 hours total, ~$15-17 cost.
# Uses PGA-MAP-Elites: GA (Iso+LineDD) + PG (TD3 critic gradient ascent).

# Archive — 25x25 produces meaningful heatmap for paper figures.
# 50x50 requires ~4x more compute (full run, not budget).
grid_shape: [25, 25]
min_bd: [-5.0, 0.0]
max_bd: [-1.0, 1.0]

# QD batches — GA + PG emitters
ga_batch_size: 128
pg_batch_size: 128
num_iterations: 700

# Environment — 64 seeds per policy for low-variance fitness estimates.
episode_length: 250
env_batch_size: 64

# Networks — matches paper spec.
policy_hidden: 64
iso_sigma: 0.005
line_sigma: 0.05

# PG emitter (TD3 critic + policy gradient)
critic_hidden: 256
critic_lr: 0.0003
actor_lr: 0.0003
pg_steps: 100
critic_steps: 300
pg_buffer_size: 2000000
pg_warmup: 5000

# Logging
log_every: 50
save_every: 100
wandb_project: orcaQD
wandb_entity: amugoodbad
wandb_enabled: true
out_dir: /artifacts/runs/budget
