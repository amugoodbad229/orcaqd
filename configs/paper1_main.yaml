# Paper 1 headline config — full QD run on H100.
# Expected wall-clock: 2.5-4 hours. Cost on Modal: ~$10.

# Archive
grid_shape: [50, 50]
min_bd: [-5.0, 0.0]
max_bd: [-1.0, 1.0]

# QD
batch_size: 1024
num_iterations: 100000
pg_steps: 100

# Environment
episode_length: 250
env_batch_size: 4096

# Networks
policy_hidden: 64
critic_hidden: 256
policy_lr: 0.0003
critic_lr: 0.0003

# Logging
log_every: 100
save_every: 10000
wandb_project: orcaqd
wandb_enabled: true

# Output
out_dir: /artifacts/runs/paper1_main
