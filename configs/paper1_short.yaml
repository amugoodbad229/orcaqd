# Short validation run on A100-80GB (~$0.50, 5-10 minutes).
# Larger than smoke but small enough to fit in tight budget.
# Confirms scaling works before the headline run.

# Archive (smaller grid for faster iteration)
grid_shape: [25, 25]
min_bd: [0.0, 0.0]
max_bd: [0.1, 1.0]

# QD batches — keep env_batch_size small to avoid long JIT compile
ga_batch_size: 128
pg_batch_size: 0
num_iterations: 50
episode_length: 100
env_batch_size: 64

# Networks
policy_hidden: 64
iso_sigma: 0.005
line_sigma: 0.05

# PG emitter (unused but config requires it)
critic_hidden: 256
critic_lr: 0.0003
actor_lr: 0.0003
pg_steps: 50
pg_buffer_size: 10000
pg_warmup: 1000

# Logging — wandb enabled, logs to amugoodbad/orcaQD project
log_every: 10
save_every: 50
wandb_project: orcaQD
wandb_entity: amugoodbad
wandb_enabled: true
out_dir: /artifacts/runs/short
