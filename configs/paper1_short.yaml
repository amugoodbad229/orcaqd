# Short validation run on A100-80GB (~$0.50, 5-10 minutes).
# Larger than smoke but small enough to fit in tight budget.
# Confirms scaling works before the headline run.

# Archive (smaller grid for faster iteration)
grid_shape: [25, 25]
min_bd: [-5.0, 0.0]
max_bd: [-1.0, 1.0]

# QD batches
ga_batch_size: 256
pg_batch_size: 0
num_iterations: 200
episode_length: 100
env_batch_size: 512

# Networks
policy_hidden: 64
iso_sigma: 0.005
line_sigma: 0.05

# PG emitter (unused but config requires it)
critic_hidden: 256
critic_lr: 0.0003
actor_lr: 0.0003
pg_steps: 50
pg_buffer_size: 10000
pg_warmup: 1000

# Logging
log_every: 20
save_every: 100
wandb_project: orcaqd
wandb_enabled: true
out_dir: /artifacts/runs/short
