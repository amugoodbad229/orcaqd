# GA-only baseline for comparison (3000 iters)
# Same config as budget but pg_batch_size=0

grid_shape: [25, 25]
min_bd: [-1.134, -1.0]
max_bd: [0.611, 1.0]

ga_batch_size: 32
pg_batch_size: 0
num_iterations: 3000
episode_length: 100
env_batch_size: 32

policy_hidden: 64
iso_sigma: 0.005
line_sigma: 0.05

critic_hidden: 256
critic_lr: 0.0003
actor_lr: 0.0003
pg_steps: 50
critic_steps: 100
pg_buffer_size: 500000
pg_warmup: 1000

log_every: 100
save_every: 500
wandb_project: orcaQD
wandb_entity: amugoodbad
wandb_enabled: true
out_dir: /artifacts/runs/ga_only_baseline
